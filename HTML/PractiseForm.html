<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=h1, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Application Form</h1>
    <form
      action="
    "
    >
      <label for="fname">First Name</label>
      <input id="fname" type="text" />
      <label for="lname">Last Name</label>
      <input id="lname" type="text" />
      <br /><br />
      <label for="dob">Date of Birth</label>
      <input id="dob" type="date" />

      <label for="age">Age</label>
      <input id="age" type="number" />
      <br /><br />
      <label for="gender">Gender</label>
      <select name="" id="gender">
        <option value="">Male</option>
        <option value="">Female</option>
        <option value="">Other</option>
      </select>
      <label for="emailAddress">Email Address</label>
      <input placeholder="Enter your email" id="emailAddress" type="email" />

      <br /><br />
      <label for="pos">Positions Avaialble:</label>
      <input name="pos" id="Junior" type="radio" />
      <label for="Junior">Junior Developer</label>

      <input name="pos" id="mid level developer" type="radio" />
      <label for="mid level developer">Mid level developer</label>
      <input value="senior developer" name="pos" id="senior developer" type="radio" />
      <label for="senior developer">Senior developer</label>

      <br /><br />
      <label for="">Programming Language :</label>
      <input type="checkbox" id="java" />
      <label for="java">Java</label>
      <input type="checkbox" id="javascript" />
      <label for="javascript">Javascript</label>
      <input type="checkbox" id="python" />
      <label for="python">Python</label>
      <br /><br />
      <label for="password">Password</label>
      <input id="password" type="password" />
      <label for="cpassword">Confirm Password</label>
      <input id="cpassword" type="text" />
      <br /><br />
      <input type="submit" />
      <input type="reset" />
    </form>
  </body>
</html>
