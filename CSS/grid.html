<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      .parent {
        height: 100vh;
        width: 100vw;
        background-color: lightgrey;
        border: 5px solid black;
        display: grid;
        grid-template-rows: 1fr 1fr 1fr 1fr;
        grid-template-columns: repeat(5, 1fr);
      }
      .child {
        background-color: lightskyblue;
        border: 5px solid black;
      }
      .one {
        grid-row-start: 1;
        grid-row-end: 3;
        grid-column-start: 1;
        grid-column-end: 2;
        background-color: rgb(255, 85, 85);
      }
      .two {
        grid-row-start: 1;
        grid-row-end: 2;
        grid-column-start: 2;
        grid-column-end: 4;
        background-color: lightseagreen;
      }

      .three {
        grid-row-start: 1;
        grid-row-end: 2;
        grid-column-start: 4;
        grid-column-end: 6;
        background-color: lightsalmon;
      }

      .four {
        grid-row-start: 2;
        grid-row-end: 4;
        grid-column-start: 2;
        grid-column-end: 3;
        background-color: lightpink;
      }

      .five {
        grid-row-start: 2;
        grid-row-end: 4;
        grid-column-start: 3;
        grid-column-end: 5;
        background-color: cadetblue;
      }

      .six {
        grid-row-start: 2;
        grid-row-end: 5;
        grid-column-start: 5;
        grid-column-end: 6;
        background-color: lightcoral;
      }
      .seven {
        grid-row-start: 3;
        grid-row-end: 5;
        grid-column-start: 1;
        grid-column-end: 2;
        background-color: lightcoral;
      }
      .eight {
        grid-row-start: 4;
        grid-row-end: 5;
        grid-column-start: 2;
        grid-column-end: 4;
        background-color: lightslategrey;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child one"></div>
      <div class="child two"></div>
      <div class="child three"></div>
      <div class="child four"></div>
      <div class="child five"></div>
      <div class="child six"></div>
      <div class="child seven"></div>
      <div class="child eight"></div>
      <div class="child"></div>
    </div>
  </body>
</html>
