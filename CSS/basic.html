<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* Selectors 
        1) Element selector 
        2) Class Selector 
        3) Id selector 
        4) Attribute selector 
        5) Global Selector 
        6) Combined Selectors
         */
      /* Element selectors */
      h1 {
      }
      h3 {
        color: red;
      }

      /* Class selectors */
      .h12 {
        font-family: cursive;
      }

      .primaryFont {
        font-size: 16px;
        font-family: Arial, Helvetica, sans-serif;
        font-weight: 500;
      }
      .secondaryFont {
        font-size: 12px;
        font-family: Arial, Helvetica, sans-serif;
        font-weight: 300;
      }

      .primaryColor {
        background-color: greenyellow;
      }
      .secondaryColor {
        background-color: white;
      }
    </style>
  </head>
  <body>
    <!-- inline CSS  -->
    <h1 class="primaryColor">I am heading tag</h1>
    <p style="font-size: 2rem; font-weight: 700">I am paragraph tag</p>
    <!-- Internal CSS  -->

    <h1 class="primaryFont primaryColor">I am h1tag 2</h1>
    <h3>I am h3 tag</h3>
    <h3 class="secondaryFont">I am h3 tag 2</h3>
  </body>
</html>
