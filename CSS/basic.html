<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* Selectors 
        1) Element selector 
        2) Class Selector 
        3) Id selector 
        4) Attribute selector 
        5) Global Selector 
        6) Combined Selectors
         */

      h1 {
        font-family: cursive;
      }
      h3 {
        color: red;
      }
    </style>
  </head>
  <body>
    <!-- inline CSS  -->
    <h1 style="color: red; background-color: blue">I am heading tag</h1>
    <p style="font-size: 2rem; font-weight: 700">I am paragraph tag</p>
    <!-- Internal CSS  -->

    <h1>I am h1tag 2</h1>
    <h3>I am h3 tag</h3>
    <h3>I am h3 tag 2</h3>
  </body>
</html>
