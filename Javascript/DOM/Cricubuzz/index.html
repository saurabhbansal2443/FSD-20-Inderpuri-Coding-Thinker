<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .square {
        height: 100px;
        width: 100px;
        background-color: lightblue;
        margin: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .circle {
        height: 100px;
        width: 100px;
        background-color: lightblue;
        margin: 10px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .square:hover {
        transform: scale(1.2);
      }
      .circle:hover {
        transform: scale(1.2);
      }
    </style>
  </head>
  <body>
    <input id="input" type="number" />
    <button id="btn">Add</button>
    <select name="" id="shape">
      <option value="square">Square</option>
      <option value="circle">Circle</option>
    </select>
    <input id="color" type="color" />
    <div class="container">
      <!-- <div class="square"></div>
      <div class="circle"></div> -->
    </div>
  </body>
  <script>
    const inputTag = document.getElementById("input");
    const button = document.getElementById("btn");
    const boxContainer = document.querySelector(".container");
    const shapeInput = document.getElementById("shape");
    const colorInput = document.getElementById("color");

    // const colors = ["red", "blue", "green"];

    button.addEventListener("click", function () {
      const boxQuantity = inputTag.valueAsNumber;
      //   console.log("boxQuantity", boxQuantity);
      boxContainer.innerHTML = "";
      const shape = shapeInput.value;
      const bgColor = colorInput.value;

      if (boxQuantity > 100) {
        alert("The Qunatity of boxex could not exceed than 100 ");
        return;
      }

      for (let i = 1; i <= boxQuantity; i++) {
        const boxEle = document.createElement("div");
        // const bgColor = colors[Math.floor(Math.random() * colors.length - 1)];
        boxEle.innerText = i;
        boxEle.classList.add(shape);
        boxEle.style.backgroundColor = bgColor;

        boxEle.addEventListener("dblclick", function () {
          //  console.log(i, "th box clicked");
          boxContainer.removeChild(boxEle);
        });
        boxContainer.appendChild(boxEle);
      }
      //   console.log(boxEle);
    });
  </script>
</html>
