<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .square {
        height: 100px;
        width: 100px;
        border: 5px solid red;
        margin: 10px;
      }
      .circle {
        height: 100px;
        width: 100px;
        border: 5px solid red;
        margin: 10px;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <input id="input" type="number" />
    <button id="btn">Add</button>

    <select name="" id="shape">
      <option value="square">Square</option>
      <option value="circle">Circle</option>
    </select>

    <div class="container">
      <!-- <div class="square"></div>
      <div class="circle"></div> -->
    </div>
  </body>
  <script>
    const inputTag = document.getElementById("input");
    const button = document.getElementById("btn");
    const boxContainer = document.querySelector(".container");
    const shapeInput = document.getElementById("shape");

    button.addEventListener("click", function () {
      const boxQuantity = inputTag.valueAsNumber;
      //   console.log("boxQuantity", boxQuantity);
      boxContainer.innerHTML = "";
      const shape = shapeInput.value;

      for (let i = 1; i <= boxQuantity; i++) {
        const boxEle = document.createElement("div");
        boxEle.classList.add(shape);
        boxContainer.appendChild(boxEle);
      }
      //   console.log(boxEle);
    });
  </script>
</html>
